apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "synera-landing-page.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "synera-landing-page.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "synera-landing-page.name" . }}
    spec:
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | quote }}
            {{- if .Values.mcp.secretName }}
            - name: MCP_SERVER_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.secretName }}
                  key: MCP_SERVER_URL
            - name: MCP_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.secretName }}
                  key: MCP_AUTH_TOKEN
            {{- if .Values.mcp.model }}
            - name: MCP_MODEL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.secretName }}
                  key: MCP_MODEL
                  optional: true
            {{- end }}
            {{- if .Values.mcp.systemPrompt }}
            - name: MCP_SYSTEM_PROMPT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.mcp.secretName }}
                  key: MCP_SYSTEM_PROMPT
                  optional: true
            {{- end }}
            {{- else }}
            {{- if .Values.mcp.serverUrl }}
            - name: MCP_SERVER_URL
              value: {{ .Values.mcp.serverUrl | quote }}
            {{- end }}
            {{- if .Values.mcp.authToken }}
            - name: MCP_AUTH_TOKEN
              value: {{ .Values.mcp.authToken | quote }}
            {{- end }}
            {{- if .Values.mcp.model }}
            - name: MCP_MODEL
              value: {{ .Values.mcp.model | quote }}
            {{- end }}
            {{- if .Values.mcp.systemPrompt }}
            - name: MCP_SYSTEM_PROMPT
              value: {{ .Values.mcp.systemPrompt | quote }}
            {{- end }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
