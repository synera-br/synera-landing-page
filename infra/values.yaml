replicaCount: 1

image:
  repository: ghcr.io/synera/landing-page
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: synera.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

gateway:
  enabled: true
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
  hostnames:
    - synera.local

# MCP chatbot configuration
# Reference an existing Kubernetes Secret that holds MCP credentials.
# The Secret must contain keys: MCP_SERVER_URL and MCP_AUTH_TOKEN.
# Optional keys: MCP_MODEL, MCP_SYSTEM_PROMPT, PORT
mcp:
  secretName: ""   # e.g. synera-mcp-credentials
  # Direct env var values (ignored when secretName is set)
  serverUrl: ""
  authToken: ""
  model: ""
  systemPrompt: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
