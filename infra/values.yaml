replicaCount: 1

image:
  repository: ghcr.io/synera/landing-page
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 4173

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: synera.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
